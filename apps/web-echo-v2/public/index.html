<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #ffffff;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input {
      flex: 1;
      padding: 0.65rem 0.85rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #4a9eff; }

    button {
      padding: 0.65rem 1.25rem;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: #3a8eef; }
    button:active { background: #2a7edf; }

    .response {
      margin-top: 1.25rem;
      padding: 0.75rem 0.85rem;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.9rem;
      color: #8be9fd;
      min-height: 2.5rem;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    .response.visible { display: block; }
    .response.error { color: #ff6b6b; }

    .footer {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 0.75rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Echo</h1>
    <p class="subtitle">Send a message and get it back.</p>
    <div class="input-row">
      <input type="text" id="msg" placeholder="Type something..." autocomplete="off" />
      <button id="send">Send</button>
    </div>
    <div class="response" id="response"></div>
    <p class="footer">version 2</p>
  </div>
  <script>
    const input = document.getElementById("msg");
    const btn = document.getElementById("send");
    const out = document.getElementById("response");

    async function send() {
      const message = input.value.trim();
      if (!message) return;

      out.classList.remove("error");
      out.classList.add("visible");
      out.textContent = "...";

      try {
        const base = window.location.pathname.replace(/\/?$/, "/");
        const start = performance.now();
        const res = await fetch(base + "echo", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        const ms = (performance.now() - start).toFixed(0);
        if (!res.ok) {
          throw new Error(data.error || res.statusText);
        }
        out.textContent = data.response + "  (" + ms + " ms)";
      } catch (err) {
        out.classList.add("error");
        out.textContent = err.message;
      }
    }

    btn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") send();
    });
    input.focus();
  </script>
</body>
</html>
